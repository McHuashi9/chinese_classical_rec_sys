name: Flutter Desktop Build

on:
  workflow_dispatch:

jobs:
  build-linux:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.27.x'

      - name: Install Linux dependencies
        run: sudo apt-get update && sudo apt-get install -y libgtk-3-dev liblzma-dev pkg-config fuse

      - name: Build chinese_core
        run: |
          cmake -B build -DCMAKE_BUILD_TYPE=Release
          cmake --build build --target chinese_core -j$(nproc)

      - name: Cache Flutter dependencies
        uses: actions/cache@v4
        with:
          path: |
            flutter_app/.dart_tool
            ~/.pub-cache
          key: ${{ runner.os }}-flutter-${{ hashFiles('flutter_app/pubspec.yaml') }}

      - name: Flutter pub get
        run: flutter pub get
        working-directory: flutter_app

      - name: Flutter analyze
        run: flutter analyze
        working-directory: flutter_app

      - name: Package AppImage
        run: bash packaging/appimage/build.sh

      - uses: actions/upload-artifact@v4
        with:
          name: chinese-classical-linux
          path: chinese-classical-rec-sys-*-linux.AppImage
          retention-days: 7

  build-windows:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.27.x'

      - name: Extract version
        id: version
        shell: bash
        run: |
          VERSION=$(grep '^version: ' flutter_app/pubspec.yaml | sed 's/version: //' | tr -d '[:space:]')
          echo "version=${VERSION}" >> $GITHUB_OUTPUT

      - name: Cache Flutter dependencies
        uses: actions/cache@v4
        with:
          path: |
            flutter_app/.dart_tool
            ~/.pub-cache
          key: ${{ runner.os }}-flutter-${{ hashFiles('flutter_app/pubspec.yaml') }}

      - uses: ./.github/actions/build-windows
        with:
          version: ${{ steps.version.outputs.version }}

      - uses: actions/upload-artifact@v4
        with:
          name: chinese-classical-windows
          path: chinese-classical-rec-sys-*.exe
          retention-days: 7

  build-android:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.27.x'
      - uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
      - name: Cache Flutter dependencies
        uses: actions/cache@v4
        with:
          path: |
            flutter_app/.dart_tool
            ~/.pub-cache
          key: ${{ runner.os }}-flutter-${{ hashFiles('flutter_app/pubspec.yaml') }}

      - name: Flutter build apk
        run: |
          flutter pub get
          flutter build apk --release --target-platform android-arm64
        working-directory: flutter_app
      - name: Rename APK
        shell: bash
        run: |
          VERSION=$(grep '^version: ' flutter_app/pubspec.yaml | sed 's/version: //' | tr -d '[:space:]')
          cp flutter_app/build/app/outputs/flutter-apk/app-release.apk \
            "chinese-classical-rec-sys-${VERSION}-android.apk"
      - uses: actions/upload-artifact@v4
        with:
          name: chinese-classical-android
          path: chinese-classical-rec-sys-*-android.apk
          retention-days: 7
