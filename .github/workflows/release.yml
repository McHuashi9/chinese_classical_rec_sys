name: Release
on:
  push:
    tags:
      - 'v*'

jobs:
  build:
    strategy:
      matrix:
        include:
          - os: ubuntu-22.04
            artifact_name: chinese_classical_rec_sys
            asset_name: chinese_classical_rec_sys-${{ github.ref_name }}-linux
          - os: windows-latest
            artifact_name: chinese_classical_rec_sys.exe
            asset_name: chinese_classical_rec_sys-${{ github.ref_name }}-windows

    runs-on: ${{ matrix.os }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup CMake
        uses: jwlawson/actions-setup-cmake@v2
        with:
          cmake-version: '3.28'

      - name: Install Qt 6 (Linux)
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y qt6-base-dev qt6-declarative-dev libgl1-mesa-dev

      - name: Install Qt 6 (Windows)
        if: runner.os == 'Windows'
        uses: jurplel/install-qt-action@v4
        with:
          version: '6.6.*'
          host: 'windows'
          target: 'desktop'
          arch: 'win64_msvc2019_64'

      - name: Configure
        run: cmake -B build -DCMAKE_BUILD_TYPE=Release

      - name: Build
        run: cmake --build build --config Release --target chinese_classical_rec_sys

      - name: Build tests with verbose output
        run: cmake --build build --config Release --target test_runner --verbose
        continue-on-error: true

      - name: Run tests
        run: ctest --test-dir build -C Release --output-on-failure

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install Python dependencies
        run: pip install -r requirements-ci.txt

      - name: Generate database
        run: python scripts/init_data.py

      - name: Package (Linux)
        if: runner.os == 'Linux'
        run: |
          # 创建 AppDir 结构
          mkdir -p build/AppDir/usr/bin
          mkdir -p build/AppDir/usr/share
          cp build/${{ matrix.artifact_name }} build/AppDir/usr/bin/
          # 复制 data 目录（只读模板，首次启动时复制到可写位置）
          cp -r build/data build/AppDir/usr/bin/data
          # 仅复制需要的 8 个字体文件
          fonts_dir="build/AppDir/usr/bin/fonts"
          fonts_list=(
            "HarmonyOS Sans 字体/HarmonyOS_SansSC/HarmonyOS_SansSC_Regular.ttf"
            "HarmonyOS Sans 字体/HarmonyOS_SansSC/HarmonyOS_SansSC_Bold.ttf"
            "LXGWWenKai-Regular/LXGWWenKai-Regular.ttf"
            "LXGWWenKai-Regular/LXGWWenKai-Light.ttf"
            "LXGWWenKai-Regular/LXGWWenKai-Medium.ttf"
            "SourceHanSerifSC/OTF/SimplifiedChinese/SourceHanSerifSC-Regular.otf"
            "SourceHanSerifSC/OTF/SimplifiedChinese/SourceHanSerifSC-Light.otf"
            "SourceHanSerifSC/OTF/SimplifiedChinese/SourceHanSerifSC-Bold.otf"
          )
          for f in "${fonts_list[@]}"; do
            mkdir -p "$(dirname "$fonts_dir/$f")"
            cp "gui/fonts/$f" "$fonts_dir/$f"
          done
          # 创建 .desktop 文件（AppDir 根目录）
          cat > build/AppDir/${{ matrix.artifact_name }}.desktop << 'DEOF'
          [Desktop Entry]
          Type=Application
          Name=古文推荐
          Comment=中国古文推荐系统
          Exec=${{ matrix.artifact_name }}
          Icon=${{ matrix.artifact_name }}
          Categories=Education;Literature;
          DEOF
          # 生成最小图标文件
          python3 -c "
          import struct,zlib
          w,h=256,256
          def chunk(t,d):
              c=t+d;return struct.pack('>I',len(d))+c+struct.pack('>I',zlib.crc32(c)&0xffffffff)
          raw=b''
          for y in range(h):
              raw+=b'\x00'+bytes([0x66,0xcc,0xff])*(w)
          png=b'\x89PNG\r\n\x1a\n'+chunk(b'IHDR',struct.pack('>IIBBBBB',w,h,8,2,0,0,0))+chunk(b'IDAT',zlib.compress(raw))+chunk(b'IEND',b'')
          open('build/AppDir/${{ matrix.artifact_name }}.png','wb').write(png)
          "
          # 使用 linuxdeployqt 部署 Qt 库到 AppDir，然后打包 AppImage
          wget -q https://github.com/probonopd/linuxdeployqt/releases/download/continuous/linuxdeployqt-continuous-x86_64.AppImage
          chmod +x linuxdeployqt-continuous-x86_64.AppImage
          export APPIMAGE_EXTRACT_AND_RUN=1
          ./linuxdeployqt-continuous-x86_64.AppImage build/AppDir/usr/bin/${{ matrix.artifact_name }} -appimage -qmake=/usr/lib/qt6/bin/qmake -qmldir=gui/qml
          # 创建发布包
          mkdir -p ${{ matrix.asset_name }}/data
          cp 古文推荐*.AppImage ${{ matrix.asset_name }}/ 2>/dev/null || cp build/AppDir/usr/bin/${{ matrix.artifact_name }} ${{ matrix.asset_name }}/
          cp build/data/classical.db ${{ matrix.asset_name }}/data/
          cp LICENSE ${{ matrix.asset_name }}/
          tar -czvf ${{ matrix.asset_name }}.tar.gz ${{ matrix.asset_name }}
          echo "ASSET_PATH=${{ matrix.asset_name }}.tar.gz" >> $GITHUB_ENV

      - name: Package (Windows)
        if: runner.os == 'Windows'
        run: |
          $pkg = "${{ matrix.asset_name }}"
          mkdir $pkg\data
          copy build\Release\${{ matrix.artifact_name }} $pkg\
          copy build\data\classical.db $pkg\data\
          copy LICENSE $pkg\
          # 仅复制需要的 8 个字体文件
          $f = "build\fonts"
          $fonts = @(
            "HarmonyOS Sans 字体\HarmonyOS_SansSC\HarmonyOS_SansSC_Regular.ttf",
            "HarmonyOS Sans 字体\HarmonyOS_SansSC\HarmonyOS_SansSC_Bold.ttf",
            "LXGWWenKai-Regular\LXGWWenKai-Regular.ttf",
            "LXGWWenKai-Regular\LXGWWenKai-Light.ttf",
            "LXGWWenKai-Regular\LXGWWenKai-Medium.ttf",
            "SourceHanSerifSC\OTF\SimplifiedChinese\SourceHanSerifSC-Regular.otf",
            "SourceHanSerifSC\OTF\SimplifiedChinese\SourceHanSerifSC-Light.otf",
            "SourceHanSerifSC\OTF\SimplifiedChinese\SourceHanSerifSC-Bold.otf"
          )
          $fonts | ForEach-Object {
            $dst = "$pkg\fonts\$_"
            New-Item -ItemType Directory -Force (Split-Path $dst -Parent) | Out-Null
            Copy-Item "$f\$_" $dst -Force
          }
          windeployqt $pkg\${{ matrix.artifact_name }} --qmldir gui\
          mkdir ${{ matrix.asset_name }}\Qt\plugins
          if (Test-Path ${{ matrix.asset_name }}\qml) { Move-Item ${{ matrix.asset_name }}\qml ${{ matrix.asset_name }}\Qt\qml }
          'platforms', 'imageformats', 'iconengines', 'generic', 'networkinformation', 'tls', 'qmltooling' | ForEach-Object {
            if (Test-Path ${{ matrix.asset_name }}\$_) { Move-Item ${{ matrix.asset_name }}\$_ ${{ matrix.asset_name }}\Qt\plugins\$_ }
          }
          if (Test-Path ${{ matrix.asset_name }}\translations) { Move-Item ${{ matrix.asset_name }}\translations ${{ matrix.asset_name }}\Qt\translations }
          @"
          [Paths]
          Plugins = Qt/plugins
          QmlImports = Qt/qml
          Translations = Qt/translations
          "@ | Out-File -FilePath ${{ matrix.asset_name }}\qt.conf -Encoding ascii
          Compress-Archive -Path ${{ matrix.asset_name }} -DestinationPath ${{ matrix.asset_name }}.zip
          echo "ASSET_PATH=${{ matrix.asset_name }}.zip" >> $env:GITHUB_ENV

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.asset_name }}
          path: ${{ env.ASSET_PATH }}

  release:
    needs: build
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Download Linux artifact
        uses: actions/download-artifact@v4
        with:
          name: chinese_classical_rec_sys-${{ github.ref_name }}-linux
          path: artifacts

      - name: Download Windows artifact
        uses: actions/download-artifact@v4
        with:
          name: chinese_classical_rec_sys-${{ github.ref_name }}-windows
          path: artifacts

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          files: artifacts/*
          generate_release_notes: true
