name: chinese_classical_rec_sys
description: 文言文推荐系统 - Flutter Desktop 版
publish_to: 'none'
version: 0.3.0

environment:
  sdk: '>=3.2.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  provider: ^6.1.1
  ffi: ^2.1.0
  path_provider: ^2.1.0
  http: ^1.2.0
  shared_preferences: ^2.2.0
  url_launcher: ^6.2.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.0

flutter:
  uses-material-design: true

  fonts:
    - family: SourceHanSerifSC
      fonts:
        - asset: assets/fonts/SourceHanSerifSC-Regular.otf
        - asset: assets/fonts/SourceHanSerifSC-Light.otf
          weight: 300
    - family: LXGWWenKai
      fonts:
        - asset: assets/fonts/LXGWWenKai-Regular.ttf
        - asset: assets/fonts/LXGWWenKai-Medium.ttf
          weight: 500
    - family: HarmonyOSSansSC
      fonts:
        - asset: assets/fonts/HarmonyOS_SansSC_Regular.ttf
        - asset: assets/fonts/HarmonyOS_SansSC_Bold.ttf
          weight: 700

  assets:
    - assets/data/classical.db
    - assets/data/db_version.txt
